services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-lottery}-app
    ports:
      - "${APP_PORT:-18267}:3001"
    volumes:
      - lottery-data:/app/api/data
      - lottery-uploads:/app/api/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lottery-data:
  lottery-uploads:
